kind = "web"
previewPath = "/"
title = "IELTS Coaching Center"
version = "1.0.0"
id = "artifacts/ielts-coaching"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18685

[services.development]
run = "pnpm --filter @workspace/ielts-coaching run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ielts-coaching", "run", "build" ]
publicDir = "artifacts/ielts-coaching/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18685"
BASE_PATH = "/"
